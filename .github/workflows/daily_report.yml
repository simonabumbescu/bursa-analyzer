name: Raport zilnic BVB

# Ruleaza zilnic la ora setata + posibilitate de rulare manuala (buton "Run workflow").
on:
  schedule:
    # Vrem 09:00 si 19:00 ora Romaniei, luni-vineri.
    # GitHub ruleaza in UTC, iar scriptul (daily_report.py) verifica ora Romaniei
    # si trimite DOAR daca e ora 9 sau 19 - asa merge corect si vara si iarna.
    # Acoperim ambele variante de fus:
    - cron: '0 6 * * 1-5'    # 09:00 RO vara (EEST, UTC+3)
    - cron: '0 7 * * 1-5'    # 09:00 RO iarna (EET, UTC+2)
    - cron: '0 16 * * 1-5'   # 19:00 RO vara (EEST, UTC+3)
    - cron: '0 17 * * 1-5'   # 19:00 RO iarna (EET, UTC+2)
  workflow_dispatch: {}   # permite pornire manuala din tab-ul Actions

jobs:
  raport:
    runs-on: ubuntu-latest
    steps:
      - name: Descarca codul
        uses: actions/checkout@v4

      - name: Instaleaza Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instaleaza dependentele
        run: pip install -r requirements.txt

      - name: Genereaza si trimite raportul
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python daily_report.py
